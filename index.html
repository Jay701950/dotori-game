<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ultimate Clicker</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
overflow:hidden;
}

#topbar{
position:absolute;
top:10px;
left:10px;
font-size:20px;
}

#shopBtn{
position:absolute;
top:50px;
left:10px;
padding:10px 20px;
background:#444;
border:none;
color:white;
cursor:pointer;
}

#shop{
position:absolute;
top:100px;
left:10px;
width:250px;
background:#222;
padding:15px;
display:none;
border-radius:10px;
}

#closeShop{
background:red;
border:none;
color:white;
cursor:pointer;
}

.upgrade{
margin-top:10px;
background:#333;
padding:10px;
cursor:pointer;
}

#clickCircle{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:200px;
height:200px;
border-radius:50%;
background:linear-gradient(145deg,#4caf50,#2e7d32);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
box-shadow:0 0 40px #4caf50;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="login">
<h2>Login</h2>
<input id="username" placeholder="아이디">
<button onclick="login()">Start</button>
</div>

<div id="topbar">
💰 <span id="points">0</span><br>
👤 <span id="user"></span>
</div>

<button id="shopBtn">상점</button>

<div id="shop">

<button id="closeShop">닫기</button>

<h3>업그레이드</h3>

<div class="upgrade" onclick="buyClick()">
클릭 배율 업그레이드  
<br>
Cost: <span id="clickCost">10</span>
</div>

<div class="upgrade" onclick="buyAuto()">
오토 포인트  
<br>
Cost: <span id="autoCost">25</span>
</div>

</div>

<div id="clickCircle">CLICK</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6whp6QHcyOuBQ2cw2nuWlxV8KWChW_CM",
authDomain: "dotori-game.firebaseapp.com",
projectId: "dotori-game",
storageBucket: "dotori-game.firebasestorage.app",
messagingSenderId: "600286348366",
appId: "1:600286348366:web:3ec0e53c54b07d5c4cef1f",
measurementId: "G-7EX7B1T5C9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user=""
let points=0
let clickPower=1
let auto=0

let clickCost=10
let autoCost=25

function updateUI(){
document.getElementById("points").innerText=Math.floor(points)
document.getElementById("clickCost").innerText=Math.floor(clickCost)
document.getElementById("autoCost").innerText=Math.floor(autoCost)
}

document.getElementById("clickCircle").onclick=()=>{
points+=clickPower
updateUI()
}

setInterval(()=>{
points+=auto
updateUI()
},1000)

window.buyClick=()=>{
if(points>=clickCost){
points-=clickCost
clickPower*=2
clickCost*=2.2
updateUI()
}
}

window.buyAuto=()=>{
if(points>=autoCost){
points-=autoCost
auto+=1
autoCost*=2.5
updateUI()
}
}

document.getElementById("shopBtn").onclick=()=>{
document.getElementById("shop").style.display="block"
}

document.getElementById("closeShop").onclick=()=>{
document.getElementById("shop").style.display="none"
}

window.login=async()=>{

user=document.getElementById("username").value

document.getElementById("login").style.display="none"
document.getElementById("user").innerText=user

const ref=doc(db,"save",user)
const snap=await getDoc(ref)

if(snap.exists()){
const data=snap.data()

points=data.points
clickPower=data.clickPower
auto=data.auto
clickCost=data.clickCost
autoCost=data.autoCost
}

updateUI()

setInterval(save,3000)

}

async function save(){

if(user==="")return

await setDoc(doc(db,"save",user),{
points,
clickPower,
auto,
clickCost,
autoCost
})

}

</script>

</body>
</html>
