<!DOCTYPE html>

<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Star Clicker</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#060612;
color:white;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

#topbar{
width:100%;
max-width:900px;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
box-sizing:border-box;
}

#stars{
font-size:28px;
font-weight:bold;
}

#userid{
font-size:13px;
opacity:0.6;
}

#shopBtn{
background:#2b2b6e;
border:none;
padding:8px 15px;
color:white;
border-radius:6px;
cursor:pointer;
}

#main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

#circle{
width:min(45vw,260px);
height:min(45vw,260px);
border-radius:50%;
background:radial-gradient(circle,#4b4bff,#080830);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
transition:0.1s;
}

#circle:active{
transform:scale(0.95);
}

#shop{
position:fixed;
left:-320px;
top:0;
width:320px;
height:100%;
background:#10102a;
padding:20px;
transition:0.3s;
overflow:auto;
}

.upgrade{
background:#1c1c44;
padding:12px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
}

.upgrade:hover{
background:#2a2a6b;
}

#closeShop{
background:red;
border:none;
padding:6px 10px;
color:white;
cursor:pointer;
margin-bottom:10px;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111132;
padding:40px;
border-radius:10px;
}

.float{
position:absolute;
pointer-events:none;
color:yellow;
animation:float 1s linear forwards;
}

@keyframes float{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-50px)}
}

</style>

</head>

<body>

<div id="login">
<h2>로그인</h2>
<input id="nameInput" placeholder="아이디">
<button onclick="login()">시작</button>
</div>

<div id="topbar">

<div>
<div id="stars">⭐ 0</div>
<div id="userid"></div>
</div>

<button id="shopBtn">상점</button>

</div>

<div id="main">
<div id="circle">⭐</div>
</div>

<div id="shop">

<button id="closeShop">닫기</button>

<h2>상점</h2>

<div class="upgrade" id="clickUpgrade"></div>

<div class="upgrade" id="autoUpgrade"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6whp6QHcyOuBQ2cw2nuWlxV8KWChW_CM",
authDomain: "dotori-game.firebaseapp.com",
projectId: "dotori-game",
storageBucket: "dotori-game.firebasestorage.app",
messagingSenderId: "600286348366",
appId: "1:600286348366:web:3ec0e53c54b07d5c4cef1f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let stars=0
let clickLevel=0
let autoLevel=0

let username=""

const starText=document.getElementById("stars")

function format(n){

if(n>=1e12) return (n/1e12).toFixed(1)+"T"
if(n>=1e9) return (n/1e9).toFixed(1)+"B"
if(n>=1e6) return (n/1e6).toFixed(1)+"M"
if(n>=1e3) return (n/1e3).toFixed(1)+"K"

return Math.floor(n)

}

function clickPower(){
return Math.pow(2,clickLevel)
}

function autoPower(){
return autoLevel
}

function clickPrice(){
return Math.floor(20*Math.pow(1.35,clickLevel))
}

function autoPrice(){
return Math.floor(50*Math.pow(1.55,autoLevel))
}

function updateUI(){

starText.innerText="⭐ "+format(stars)

document.getElementById("clickUpgrade").innerText=
"클릭 배율 x"+clickPower()+"\n가격 ⭐ "+clickPrice()

document.getElementById("autoUpgrade").innerText=
"자동 생산 "+autoPower()+"/초\n가격 ⭐ "+autoPrice()

}

document.getElementById("circle").onclick=(e)=>{

stars+=clickPower()

spawnNumber(e.clientX,e.clientY)

updateUI()

}

function spawnNumber(x,y){

const el=document.createElement("div")

el.className="float"

el.innerText="+"+clickPower()

el.style.left=x+"px"

el.style.top=y+"px"

document.body.appendChild(el)

setTimeout(()=>el.remove(),1000)

}

document.getElementById("clickUpgrade").onclick=()=>{

const price=clickPrice()

if(stars>=price){

stars-=price
clickLevel++

updateUI()

}

}

document.getElementById("autoUpgrade").onclick=()=>{

const price=autoPrice()

if(stars>=price){

stars-=price
autoLevel++

updateUI()

}

}

setInterval(()=>{

stars+=autoPower()

updateUI()

},1000)

document.getElementById("shopBtn").onclick=()=>{

document.getElementById("shop").style.left="0"

}

document.getElementById("closeShop").onclick=()=>{

document.getElementById("shop").style.left="-320px"

}

async function login(){

username=document.getElementById("nameInput").value

document.getElementById("userid").innerText="ID: "+username

document.getElementById("login").style.display="none"

const ref=doc(db,"save",username)

const snap=await getDoc(ref)

if(snap.exists()){

const d=snap.data()

stars=d.stars
clickLevel=d.clickLevel
autoLevel=d.autoLevel

}

updateUI()

}

setInterval(async()=>{

if(username=="") return

await setDoc(doc(db,"save",username),{

stars,
clickLevel,
autoLevel

})

},5000)

updateUI()

</script>

</body>
</html>
